models:
  logistic_regression:
    enabled: true
    candidate_configs:
      - C: 0.01
        class_weight: null
        solver: lbfgs
        max_iter: 2000
      - C: 0.1
        class_weight: null
        solver: lbfgs
        max_iter: 2000
      - C: 1.0
        class_weight: null
        solver: lbfgs
        max_iter: 2000
      - C: 0.1
        class_weight: balanced
        solver: lbfgs
        max_iter: 2000
      - C: 1.0
        class_weight: balanced
        solver: lbfgs
        max_iter: 2000

  random_forest:
    enabled: true
    candidate_configs:
      - n_estimators: 100
        max_depth: null
        min_samples_split: 2
        class_weight: null
        random_state: 42
        n_jobs: -1
      - n_estimators: 200
        max_depth: null
        min_samples_split: 2
        class_weight: null
        random_state: 42
        n_jobs: -1
      - n_estimators: 100
        max_depth: 20
        min_samples_split: 2
        class_weight: null
        random_state: 42
        n_jobs: -1
      - n_estimators: 200
        max_depth: 20
        min_samples_split: 5
        class_weight: null
        random_state: 42
        n_jobs: -1
      - n_estimators: 200
        max_depth: 20
        min_samples_split: 5
        class_weight: balanced
        random_state: 42
        n_jobs: -1

  xgboost:
    enabled: true
    candidate_configs:
      - n_estimators: 100
        learning_rate: 0.1
        max_depth: 3
        subsample: 1.0
        colsample_bytree: 1.0
        random_state: 42
      - n_estimators: 200
        learning_rate: 0.1
        max_depth: 3
        subsample: 1.0
        colsample_bytree: 1.0
        random_state: 42
      - n_estimators: 100
        learning_rate: 0.05
        max_depth: 3
        subsample: 1.0
        colsample_bytree: 1.0
        random_state: 42
      - n_estimators: 200
        learning_rate: 0.05
        max_depth: 4
        subsample: 1.0
        colsample_bytree: 1.0
        random_state: 42
      - n_estimators: 300
        learning_rate: 0.05
        max_depth: 4
        subsample: 1.0
        colsample_bytree: 1.0
        random_state: 42

  svm:
    enabled: true
    candidate_configs:
      - kernel: linear
        C: 0.1
        class_weight: null
        probability: false
      - kernel: linear
        C: 1.0
        class_weight: null
        probability: false
      - kernel: linear
        C: 1.0
        class_weight: balanced
        probability: false
      - kernel: rbf
        C: 1.0
        gamma: scale
        class_weight: null
        probability: false
      - kernel: rbf
        C: 1.0
        gamma: scale
        class_weight: balanced
        probability: false

  mlp:
    enabled: true
    candidate_configs:
      - hidden_layer_sizes: [64]
        alpha: 0.0001
        learning_rate_init: 0.001
        max_iter: 200
        random_state: 42
      - hidden_layer_sizes: [128]
        alpha: 0.0001
        learning_rate_init: 0.001
        max_iter: 200
        random_state: 42
      - hidden_layer_sizes: [64, 32]
        alpha: 0.0001
        learning_rate_init: 0.001
        max_iter: 200
        random_state: 42
      - hidden_layer_sizes: [128, 64]
        alpha: 0.0001
        learning_rate_init: 0.001
        max_iter: 200
        random_state: 42
      - hidden_layer_sizes: [128, 64]
        alpha: 0.001
        learning_rate_init: 0.0005
        max_iter: 200
        random_state: 42
